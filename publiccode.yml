publiccodeYmlVersion: "0.5"

name: API van het API register
url: "https://github.com/developer-overheid-nl/don-api-register"
landingURL: "https://apis.developer.overheid.nl"
softwareType: standalone/backend
platforms:
  - web

categories:
  - it-management
developmentStatus: stable

description:
  nl:
    shortDescription: >-
      API van het API register (apis.developer.overheid.nl)
    longDescription: |
      Het API register biedt een centrale catalogus van APIs die worden aangeboden door de Nederlandse overheid.
      Via deze backend-API kunnen APIs worden geregistreerd, opgevraagd en beheerd. Nieuwe registraties worden
      automatisch gevalideerd en geïndexeerd in Typesense zodat ze vindbaar zijn via de zoekfunctie op
      apis.developer.overheid.nl. De service synchroniseert dagelijks de OpenAPI-specificaties van alle
      geregistreerde APIs en genereert automatisch artifacts zoals Bruno- en Postman-collecties.
    features:
      - Registratie en beheer van overheids-APIs
      - Validatie van OpenAPI-specificaties
      - Automatische dagelijkse refresh van OAS-bestanden
      - Integratie met Typesense voor zoekfunctionaliteit
      - Generatie van Bruno- en Postman-collecties

