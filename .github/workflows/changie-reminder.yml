name: changie-reminder

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  pull-requests: read
  issues: write

jobs:
  remind:
    runs-on: ubuntu-latest
    steps:
      - name: Check if PR contains a changie fragment
        id: check
        uses: actions/github-script@v8
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const pull_number = context.payload.pull_request.number;

            // Default Changie fragments location
            const fragmentRe = /^\.changes\/unreleased\/.+\.ya?ml$/i;

            let page = 1;
            let found = false;

            while (!found) {
              const { data } = await github.rest.pulls.listFiles({
                owner, repo, pull_number, per_page: 100, page
              });
              if (!data.length) break;
              found = data.some(f => f.status !== "removed" && fragmentRe.test(f.filename));
              page++;
            }

            core.setOutput("has_fragment", found ? "true" : "false");

      - name: Find existing reminder comment
        id: fc
        uses: peter-evans/find-comment@v4
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-author: "github-actions[bot]"
          body-includes: "<!-- changie-reminder -->"

      - name: Create/Update reminder (missing fragment)
        if: steps.check.outputs.has_fragment == 'false'
        uses: peter-evans/create-or-update-comment@v5
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-id: ${{ steps.fc.outputs.comment-id }}
          edit-mode: replace
          body: |
            <!-- changie-reminder -->
            👋 Deze PR mist nog een Changie changelog-fragment.

            Voeg er een toe:
            ```bash
            changie new
            ```
            Verwacht pad: `.changes/unreleased/*.yaml`

      - name: Create/Update reminder (fragment found)
        if: steps.check.outputs.has_fragment == 'true'
        uses: peter-evans/create-or-update-comment@v5
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-id: ${{ steps.fc.outputs.comment-id }}
          edit-mode: replace
          body: |
            <!-- changie-reminder -->
            ✅ Changie-fragment gevonden.
